name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # keytar (CLI dep) requires libsecret on Linux
      - name: Install keytar system dependencies
        run: sudo apt-get install -y libsecret-1-dev pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Build core
        run: npm run build --workspace packages/core

      - name: Build CLI
        run: npm run build --workspace packages/cli

      - name: Unit tests (core)
        run: npm test --workspace packages/core
