name: Publish to npm

# Triggered by pushing a version tag: git tag v0.1.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install keytar system dependencies
        run: sudo apt-get install -y libsecret-1-dev pkg-config

      - name: Install npm dependencies
        run: npm ci

      # Fix npm auto-correct noise by running pkg fix before anything else
      - name: Fix package.json normalisation
        run: |
          npm pkg fix --workspace packages/core
          npm pkg fix --workspace packages/cli

      - name: Build core
        run: npm run build --workspace packages/core

      - name: Build CLI
        run: npm run build --workspace packages/cli

      - name: Unit tests
        run: npm test --workspace packages/core

      # Dry-run to validate tarball contents without touching the registry
      - name: Dry-run — core
        run: npm publish --workspace packages/core --dry-run

      - name: Dry-run — CLI
        run: npm publish --workspace packages/cli --dry-run

      # Publish core first — CLI depends on it at ^0.1.0
      - name: Publish @brunsforge/azure-app-registration-monitor (public)
        run: npm publish --workspace packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @brunsforge/aarm (restricted)
        run: npm publish --workspace packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
