name: Publish to npm

# Triggered by pushing a version tag: git tag v0.1.x && git push --tags
on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish core package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install keytar system dependencies
        run: sudo apt-get install -y libsecret-1-dev pkg-config

      - name: Install npm dependencies
        run: npm ci

      - name: Fix package.json normalisation
        run: npm pkg fix --workspace packages/core

      - name: Build core
        run: npm run build --workspace packages/core

      - name: Unit tests
        run: npm test --workspace packages/core

      - name: Dry-run
        run: npm publish --workspace packages/core --dry-run

      - name: Publish @brunsforge/azure-app-registration-monitor (public)
        run: npm publish --workspace packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
